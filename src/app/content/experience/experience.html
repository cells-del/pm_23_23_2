<div class="col-7 px-0" style="margin-left: 40px">
  <div style="display:flex; gap: 15px; padding-bottom: 50px;">
    <i class="fa-solid fa-user-tie" style="color: #ff6600; font-size: 28px;"></i>
    <span class="text-1">WORK EXPERIENCE</span>
  </div>

  <div class="timeline">
    @for (job of experiences; track job.title) {
      <div class="item">
        <div class="title" style="display: flex; justify-content: space-between;">
          {{ job.title }}
          <span class="date">{{ job.date }}</span>
        </div>
        <div class="comp">{{ job.company }}</div>
        <div class="text">{{ job.description }}</div>
      </div>
    }
  </div>
</div>
