<div class="accordion">
  <div class="accordion-header" (click)="toggle()">
    <div style="display:flex; gap: 15px; margin-left: 0">
      <div class="bg"><i class="fa-solid fa-graduation-cap"></i></div>
      <span class="text-1">MY EDUCATION</span>
      <i class="fa-solid fa-chevron-right arrow" [class.open]="isOpen"></i>
    </div>
  </div>

  <div class="accordion-content" [class.open]="isOpen">
    <div class="timeline">
      @for (edu of educations; track edu.title) {
        <div class="item">
          <div class="title">{{ edu.title }}</div>
          <div class="place">
            {{ edu.place }}
            <span class="data">{{ edu.date }}</span>
          </div>
          <div class="text">{{ edu.description }}</div>
        </div>
      }
    </div>вфівфівф
  </div>
</div>
